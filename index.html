<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Oleksii Rohalskyi — Game Production · PM · QA</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Game-industry PM and QA leader. 7+ yrs. 8+ shipped titles. First-attempt platform certifications across PS/Xbox/Switch/Steam." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  html, body, #root { min-height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: #0c0a14;
    color: #e6e2f5;
  }
  * { box-sizing: border-box; }
  @keyframes blink { 50% { opacity: 0; } }

  /* subtle scanline atmosphere */
  body::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(
      0deg,
      rgba(178, 156, 255, 0.025) 0 1px,
      transparent 1px 3px
    );
  }
  #root { position: relative; z-index: 2; }

  a { color: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/projects.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="scenes/trophy-final.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <TrophyFinal density={tweaks.density} />
      <TweaksPanel title="Tweaks">
        <TweakSection title="Layout">
          <TweakRadio
            label="Density"
            value={tweaks.density}
            options={[
              { value: "compact", label: "Compact" },
              { value: "comfortable", label: "Comfy" },
            ]}
            onChange={(v) => setTweak("density", v)}
          />
        </TweakSection>
        <TweakSection title="About">
          <div style={{ fontSize: 12, color: "#9aa0a6", lineHeight: 1.5 }}>
            Final trophy-case portfolio. Drop this into a GitHub Pages repo
            (rename to <code>index.html</code>) and you're live.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
