  );
}

// ── NDA block ─────────────────────────────────────────────────────────────────
function NDABlock({ compact }) {
  return (
    <div style={{
      padding: compact ? 18 : 24,
      border: `1px dashed ${BRD2}`,
      background: "linear-gradient(135deg,#100d1c 0%,#14102a 100%)",
    }}>
      <div style={{ fontFamily: MONO, fontSize: 11, color: ACC, letterSpacing: 2, marginBottom: 12 }}>
        ▒ CLASSIFIED / NDA — {P.ndaProjects.length} ENTRIES · ACCESS RESTRICTED
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 8 }}>
        {P.ndaProjects.map((n) => (
          <div key={n.tag} style={{ border: `1px solid ${BRD2}`, padding: "10px 12px", background: BG }}>
            <div style={{ fontFamily: MONO, fontSize: 10, color: ACC, letterSpacing: 1.5, marginBottom: 4 }}>
              {n.tag}&nbsp; <span style={{ color: MUT2 }}>░░░░░░</span>
            </div>
            <div style={{ fontSize: 13, color: FG }}>{n.genre}</div>
            <div style={{ fontSize: 11, color: MUT, marginTop: 2 }}>{n.role}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── experience timeline ───────────────────────────────────────────────────────
function ExperienceTimeline({ compact }) {
  return (
    <div id="experience">
      <SectionHeader cmd="$ cat ./experience.log" sub="// 7+ yrs · games · OTT · LiveOps" />
      <div style={{ display: "grid", gap: compact ? 10 : 14 }}>
        {P.experience.map((e, i) => (
          <div key={e.org} className="exp-grid" style={{
            display: "grid",
            gridTemplateColumns: compact ? "56px minmax(0,1fr)" : "72px minmax(0,1fr)",
            gap: compact ? 14 : 20,
            background: PNL, border: `1px solid ${BRD}`, padding: compact ? 14 : 18,
          }}>
            <div className="exp-num" style={{
              fontFamily: MONO, fontSize: compact ? 11 : 12,
              color: ACC2, letterSpacing: 1.5, lineHeight: 1.4,
            }}>
              <div style={{ color: MUT2, fontSize: 10 }}>JOB</div>
              <div style={{ fontSize: compact ? 22 : 26, color: ACC, fontWeight: 800, marginTop: 4 }}>
                {pad2(P.experience.length - i)}
              </div>
            </div>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: "flex", gap: 12, alignItems: "baseline", flexWrap: "wrap" }}>
                <h3 style={{ margin: 0, fontSize: compact ? 17 : 20, fontWeight: 700, letterSpacing: -0.3 }}>
                  {e.role}
                </h3>
                <span style={{ fontFamily: MONO, fontSize: 11, color: ACC, letterSpacing: 1.2 }}>
                  @ {e.org}
                </span>
                <span style={{ fontFamily: MONO, fontSize: 10, color: MUT2, marginLeft: "auto" }}>
                  {e.period}
                </span>
              </div>
              <ul style={{ margin: "10px 0 0", padding: 0, listStyle: "none", display: "grid", gap: 4 }}>
                {e.bullets.map((b, j) => (
                  <li key={j} style={{ fontSize: 12.5, color: MUT, lineHeight: 1.5 }}>
                    <span style={{ color: ACC2 }}>▸</span> {b}
                  </li>
                ))}
              </ul>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── key achievements ──────────────────────────────────────────────────────────
function KeyAchievements({ compact }) {
  return (
    <div>
      <SectionHeader cmd="$ ./run --report achievements" sub={`// ${P.achievements.length} highlights`} />
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))",
        gap: compact ? 8 : 10,
      }}>
        {P.achievements.map((a, i) => (
          <div key={i} style={{
            background: PNL, border: `1px solid ${BRD}`,
            padding: compact ? 14 : 18, display: "flex", gap: 12,
          }}>
            <div style={{
              fontFamily: MONO, fontSize: 22, fontWeight: 800, color: ACC,
              letterSpacing: -1, lineHeight: 1, flexShrink: 0,
            }}>{pad2(i + 1)}</div>
            <div style={{ fontSize: 12.5, color: FG, lineHeight: 1.5 }}>{a}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── platforms report ──────────────────────────────────────────────────────────
function PlatformsReport() {
  return (
    <div>
      <SectionHeader cmd="$ ./run --report platforms" sub={`// ${P.platforms.length} targets`} />
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {P.platforms.map((pl) => (
          <span key={pl} style={{
            fontFamily: MONO, border: `1px solid ${BRD2}`, padding: "5px 10px",
            color: FG, fontSize: 12, letterSpacing: 0.5, background: PNL,
          }}>▤ {pl}</span>
        ))}
      </div>
    </div>
  );
}

// ── skills dump ───────────────────────────────────────────────────────────────
function SkillsDump({ compact }) {
  const cats = Object.keys(P.skills);
  return (
    <div id="skills">
      <SectionHeader cmd="$ cat ./skills.txt" sub={`// ${cats.length} domains`} />
      <div className="skills-grid" style={{
        display: "grid",
        gridTemplateColumns: compact ? "repeat(2,1fr)" : "repeat(4,1fr)",
        gap: 1, background: BRD, border: `1px solid ${BRD}`,
      }}>
        {cats.map((cat) => (
          <div key={cat} style={{ background: PNL, padding: compact ? 14 : 18 }}>
            <div style={{ fontFamily: MONO, fontSize: 11, color: ACC2, letterSpacing: 2, marginBottom: 10 }}>
              // {cat.toUpperCase()}
            </div>
            <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "grid", gap: 4 }}>
              {P.skills[cat].map((s) => (
                <li key={s} style={{ fontSize: 11.5, color: FG, fontFamily: MONO, lineHeight: 1.5 }}>
                  <span style={{ color: MUT2 }}>·</span> {s}
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── publications ──────────────────────────────────────────────────────────────
function Publications({ compact }) {
  return (
    <div id="publications">
      <SectionHeader cmd="$ cat ./publications.log" sub={`// ${P.publications.length} talks · articles`} />
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))",
        gap: compact ? 8 : 10,
      }}>
        {P.publications.map((pub, i) => {
          const isYT = /youtu\.?be/.test(pub.url);
          return (
            <a key={i} href={pub.url} target="_blank" rel="noopener noreferrer"
               className="pub-card"
               style={{
                 background: PNL, border: `1px solid ${BRD}`, padding: compact ? 14 : 16,
                 display: "flex", flexDirection: "column", gap: 8,
                 color: FG, textDecoration: "none",
               }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{
                  fontFamily: MONO, fontSize: 9, color: BG, background: ACC2,
                  padding: "2px 6px", letterSpacing: 1.5,
                }}>{isYT ? "▶ WATCH" : "↗ READ"}</span>
                <span style={{ fontFamily: MONO, fontSize: 10, color: ACC, letterSpacing: 1.5 }}>
                  ● {pub.kind.toUpperCase()}
                </span>
                <span style={{ fontFamily: MONO, fontSize: 10, color: MUT2, letterSpacing: 1.5 }}>
                  [{pub.lang}]
                </span>
              </div>
              <div style={{ fontSize: 13.5, color: FG, fontWeight: 600, lineHeight: 1.4 }}>
                {pub.title}
              </div>
              <div style={{ fontFamily: MONO, fontSize: 11, color: MUT, marginTop: "auto" }}>
                @ {pub.venue}
              </div>
            </a>
          );
        })}
      </div>
    </div>
  );
}

// ── education + contact ───────────────────────────────────────────────────────
function EduContact({ compact }) {
  return (
    <div id="contact" className="edu-grid" style={{
      display: "grid",
      gridTemplateColumns: compact ? "1fr" : "1fr 1fr",
      gap: compact ? 16 : 24,
    }}>
      <div>
        <SectionHeader cmd="$ cat ./education.txt" />
        <div style={{ display: "grid", gap: 8 }}>
          {P.education.map((e) => (
            <div key={e.title} style={{
              background: PNL, border: `1px solid ${BRD}`, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: FG }}>{e.title}</div>
              <div style={{ fontSize: 12, color: MUT, marginTop: 2 }}>{e.org}</div>
              <div style={{
                fontFamily: MONO, fontSize: 10, marginTop: 4,
                display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap",
              }}>
                <span style={{ color: ACC }}>● {e.year}</span>
                {e.credential && (
                  <a className="cred-link" href={e.credential.url}
                     target="_blank" rel="noopener noreferrer">
                    ↗ Credential ID {e.credential.id}
                  </a>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div>
        <SectionHeader cmd="$ ./contact --connect" />
        <div style={{ background: PNL, border: `1px solid ${BRD}`, padding: 18 }}>
          <div style={{ fontFamily: MONO, fontSize: 11, color: MUT2, letterSpacing: 1.5, marginBottom: 12 }}>
            // ESTABLISH_LINK
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {P.links.map((l) => (
              <a key={l.label} href={l.url}
                 target={l.url.startsWith("http") ? "_blank" : undefined}
                 rel={l.url.startsWith("http") ? "noopener noreferrer" : undefined}
                 style={{
                   display: "flex", justifyContent: "space-between",
                   fontFamily: MONO, fontSize: 13, color: FG, textDecoration: "none",
                   border: `1px solid ${BRD2}`, padding: "10px 14px", background: BG,
                 }}>
                <span><span style={{ color: ACC }}>▸</span> {l.label}</span>
                <span style={{ color: MUT }}>
                  {l.url.replace(/^https?:\/\//, "").replace(/^mailto:/, "")}
                </span>
              </a>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── blinking terminal cursor ──────────────────────────────────────────────────
function PromptEnd() {
  return (
    <div style={{
      fontFamily: MONO, fontSize: 13, color: MUT2,
      paddingTop: 12, borderTop: `1px dashed ${BRD}`,
    }}>
      <span style={{ color: ACC2 }}>oleksii@gamedev</span>
      <span>:</span>
      <span style={{ color: ACC }}>~/portfolio</span>
      <span>$ </span>
      <span style={{
        display: "inline-block", width: 9, height: 14, background: ACC2,
        verticalAlign: "-2px", animation: "blink 1s steps(2) infinite",
      }} />
    </div>
  );
}

// ── density toggle ────────────────────────────────────────────────────────────
function DensityToggle({ density, setDensity }) {
  return (
    <div className="dt">
      <span className="dt-lbl">DENSITY</span>
      <button className={`dt-btn${density === "compact" ? " on" : ""}`}
              onClick={() => setDensity("compact")}>COMPACT</button>
      <button className={`dt-btn${density === "comfortable" ? " on" : ""}`}
              onClick={() => setDensity("comfortable")}>COMFY</button>
    </div>
  );
}

// ── root ──────────────────────────────────────────────────────────────────────
function App() {
  const [density, setDensity] = React.useState("compact");
  const compact = density === "compact";
  const pad = compact ? 28 : 48;
  const gap = compact ? 32 : 48;

  return (
    <>
      <div style={{
        fontFamily: SANS, background: BG, color: FG,
        minHeight: "100%", width: "100%", padding: pad, boxSizing: "border-box",
      }}>
        <NavBar />
        <Hero compact={compact} />
        <div style={{ height: gap }} />
        <Legend />
        <TrophyList compact={compact} />
        <div style={{ height: gap }} />
        <NDABlock compact={compact} />
        <div style={{ height: gap }} />
        <ExperienceTimeline compact={compact} />
        <div style={{ height: gap }} />
        <KeyAchievements compact={compact} />
        <div style={{ height: gap }} />
        <PlatformsReport />
        <div style={{ height: gap }} />
        <SkillsDump compact={compact} />
        <div style={{ height: gap }} />
        <Publications compact={compact} />
        <div style={{ height: gap }} />
        <EduContact compact={compact} />
        <div style={{ height: gap }} />
        <PromptEnd />
      </div>
      <DensityToggle density={density} setDensity={setDensity} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
