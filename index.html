// ── CV PDF generation (one-page, ATS-friendly, selectable text) ──────────────
function sanitizeForATS(s) {
  return String(s)
    .replace(/≤/g, "<=")
    .replace(/≥/g, ">=")
    .replace(/·/g, "|")
    .replace(/—/g, "-")
    .replace(/–/g, "-")
    .replace(/×/g, "x")
    .replace(/[‘’‚‛]/g, "'")
    .replace(/[“”„‟]/g, '"')
    .replace(/[•●◦▪▫]/g, "-")
    .replace(/[Ѐ-ӿԀ-ԯ]+/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function generateCVPDF() {
  if (!window.jspdf) {
    alert("PDF library still loading, please try again in a moment.");
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4", compress: true });

  const PAGE_W = 210;
  const PAGE_H = 297;
  const MARGIN = 11;
  const CONTENT_W = PAGE_W - MARGIN * 2;
  let y = MARGIN;

  const TEXT = [20, 20, 30];
  const MUTED = [110, 110, 130];
  const ACCENT = [70, 50, 180];

  const clean = sanitizeForATS;

  const section = (title) => {
    y += 1.5;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(...ACCENT);
    doc.text(title.toUpperCase(), MARGIN, y);
    doc.setDrawColor(...ACCENT);
    doc.setLineWidth(0.25);
    doc.line(MARGIN, y + 0.8, MARGIN + CONTENT_W, y + 0.8);
    y += 3.5;
    doc.setTextColor(...TEXT);
  };

  const body = (text, opts = {}) => {
    const { size = 8, font = "normal", color = TEXT, indent = 0, gap = 3.2 } = opts;
    doc.setFont("helvetica", font);
    doc.setFontSize(size);
    doc.setTextColor(...color);
    const lines = doc.splitTextToSize(clean(text), CONTENT_W - indent);
    lines.forEach((ln) => {
      doc.text(ln, MARGIN + indent, y);
      y += gap;
    });
  };

  // ── Header ──
  doc.setFont("helvetica", "bold");
  doc.setFontSize(18);
  doc.setTextColor(...TEXT);
  doc.text(clean(P.bio.name), MARGIN, y);
  y += 5.5;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(10);
  doc.setTextColor(...ACCENT);
  doc.text("Game Producer | Project Manager | QA Lead | Publishing Coordinator", MARGIN, y);
  y += 4;

  doc.setFontSize(8);
  doc.setTextColor(...MUTED);
  doc.text(clean(`${P.bio.email}  |  ${P.bio.linkedin}  |  t.me/aloecastles  |  ${P.bio.location}`), MARGIN, y);
  y += 2.5;
  doc.setDrawColor(...MUTED);
  doc.setLineWidth(0.15);
  doc.line(MARGIN, y, MARGIN + CONTENT_W, y);
  y += 3;

  // ── Summary (keyword-rich) ──
  section("Professional Summary");
  body(
    "Game industry Project Manager and QA Lead with 7+ years delivering shipped titles across PlayStation, Xbox, Nintendo Switch, Steam, Steam Deck, iOS and Android. Built and scaled QA teams 3x to 18+ specialists at Pushka Studios. Delivered every platform submission certified on the first attempt across PS, Xbox, Switch and Steam. Strong background in Agile/Scrum/Kanban, publishing coordination, LiveOps, stakeholder management, and cross-platform/cross-network multiplayer QA.",
    { size: 8.2, gap: 3.4 }
  );

  // ── Core Competencies (ATS keyword block) ──
  section("Core Competencies");
  body(
    "Project Management | Game Production | QA Leadership | Quality Assurance | Agile | Scrum | Kanban | Sprint Planning | Capacity Forecasting | Risk Management | Stakeholder Reporting | Cross-functional Coordination | Platform Certification | Store Submissions | LiveOps | Build Review Cycles | Localization (L10n) | Multiplayer QA | Co-op QA | Cross-platform QA | A/B Testing | KPIs | Roadmap Ownership | Hiring | Mentoring | Performance Reviews | Resource Allocation | Vendor / Partner Coordination | OKRs",
    { size: 8, gap: 3.3 }
  );

  // ── Tools & Platforms ──
  section("Tools & Platforms");
  body(
    "Tools: Jira (JQL, workspace admin, automation) | Confluence | Notion | Miro | TestRail | Testomat | Slack workflows | Git | Fiddler | Unity | Unreal Engine | PIX | RAZOR profilers | Win64 dedicated servers",
    { size: 8, gap: 3.3 }
  );
  body(
    "Platforms: PlayStation 4 / PS5 | Xbox One / Series X|S (winGDK) | Nintendo Switch | Steam Deck | Steam | Epic Games Store | Cloud Gaming | iOS | Android | SteamVR | Valve Index",
    { size: 8, gap: 3.3 }
  );

  // ── Professional Experience (top 4) ──
  section("Professional Experience");
  const top = P.experience.slice(0, 4);
  top.forEach((e) => {
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(...TEXT);
    doc.text(clean(`${e.role} - ${e.org}`), MARGIN, y);
    doc.setFont("helvetica", "italic");
    doc.setFontSize(7.5);
    doc.setTextColor(...MUTED);
    const periodText = clean(e.period);
    const periodWidth = doc.getTextWidth(periodText);
    doc.text(periodText, MARGIN + CONTENT_W - periodWidth, y);
    y += 3.2;
    const bullets = e.bullets.slice(0, 2);
    bullets.forEach((b) => {
      body(`- ${b}`, { size: 7.8, gap: 3.1, indent: 2, color: TEXT });
    });
    y += 0.6;
  });

  // ── Shipped Titles ──
  section("Selected Shipped Titles");
  body(
    P.projects.map((p) => `${p.title} (${p.year}, ${p.platforms.join("/")})`).join(", "),
    { size: 7.8, gap: 3.1 }
  );
  body(
    `Additionally shipped ${P.ndaProjects.length} NDA projects across TPS action-adventure, FPS survival looter-shooter, turn-based and strategy board games, city builder, and tactical extraction shooter (mobile).`,
    { size: 7.8, gap: 3.1 }
  );

  // ── Key Achievements ──
  section("Key Achievements");
  P.achievements.slice(0, 3).forEach((a) => {
    body(`- ${a}`, { size: 7.8, gap: 3.1, indent: 2 });
  });

  // ── Education ──
  section("Education & Certifications");
  P.education.forEach((e) => {
    body(
      `${e.title} - ${e.org} (${e.year})${e.credential ? ` | Credential ID: ${e.credential.id}` : ""}`,
      { size: 8, gap: 3.2 }
    );
  });

  // ── Languages ──
  section("Languages");
  body("English (professional working) | Ukrainian (native) | Russian (fluent)", { size: 8, gap: 3.2 });

  // ── Footer ──
  doc.setFont("helvetica", "normal");
  doc.setFontSize(6.5);
  doc.setTextColor(...MUTED);
  const today = new Date().toISOString().slice(0, 10);
  doc.text(`Generated ${today}`, MARGIN, PAGE_H - 5);
  const right = "Online portfolio: aloecastles.github.io";
  const rightW = doc.getTextWidth(right);
  doc.text(right, MARGIN + CONTENT_W - rightW, PAGE_H - 5);

  doc.save(`Oleksii_Rohalskyi_CV_${today}.pdf`);
}

    <div>
      <SectionHeader cmd="$ ./run --report achievements" sub={`// ${P.achievements.length} highlights`} />
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(auto-fit,minmax(280px,1fr))",
        gap: compact ? 8 : 10,
      }}>
        {P.achievements.map((a, i) => (
          <div key={i} style={{
            background: PNL, border: `1px solid ${BRD}`,
            padding: compact ? 14 : 18, display: "flex", gap: 12,
          }}>
            <div style={{
              fontFamily: MONO, fontSize: 22, fontWeight: 800, color: ACC,
              letterSpacing: -1, lineHeight: 1, flexShrink: 0,
            }}>{pad2(i + 1)}</div>
            <div style={{ fontSize: 12.5, color: FG, lineHeight: 1.5 }}>{a}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── platforms report ──────────────────────────────────────────────────────────
function PlatformsReport() {
  return (
    <div>
      <SectionHeader cmd="$ ./run --report platforms" sub={`// ${P.platforms.length} targets`} />
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {P.platforms.map((pl) => (
          <span key={pl} style={{
            fontFamily: MONO, border: `1px solid ${BRD2}`, padding: "5px 10px",

// ── skills dump ───────────────────────────────────────────────────────────────
function SkillsDump({ compact }) {

    <div id="skills">
      <SectionHeader cmd="$ cat ./skills.txt" sub={`// ${cats.length} domains`} />
      <div className="skills-grid" style={{
        display: "grid",

        {cats.map((cat) => (
          <div key={cat} style={{ background: PNL, padding: compact ? 14 : 18 }}>
            <div style={{ fontFamily: MONO, fontSize: 11, color: ACC2, letterSpacing: 2, marginBottom: 10 }}>
              // {cat.toUpperCase()}
            </div>
            <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "grid", gap: 4 }}>
              {P.skills[cat].map((s) => (
                <li key={s} style={{ fontSize: 11.5, color: FG, fontFamily: MONO, lineHeight: 1.5 }}>
                  <span style={{ color: MUT2 }}>·</span> {s}
                </li>
              ))}
            </ul>
          </div>
        ))}

// ── publications ──────────────────────────────────────────────────────────────
function Publications({ compact }) {
  return (
    <div id="publications">
      <SectionHeader cmd="$ cat ./publications.log" sub={`// ${P.publications.length} talks · articles`} />
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(auto-fit,minmax(320px,1fr))",
        gap: compact ? 8 : 10,
      }}>
        {P.publications.map((pub, i) => {
          const isYT = /youtu\.?be/.test(pub.url);
          return (
            <a key={i} href={pub.url} target="_blank" rel="noopener noreferrer"
               className="pub-card"
               style={{
                 background: PNL, border: `1px solid ${BRD}`, padding: compact ? 14 : 16,
                 display: "flex", flexDirection: "column", gap: 8,
                 color: FG, textDecoration: "none",
               }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{
                  fontFamily: MONO, fontSize: 9, color: BG, background: ACC2,
                  padding: "2px 6px", letterSpacing: 1.5,
                }}>{isYT ? "▶ WATCH" : "↗ READ"}</span>
                <span style={{ fontFamily: MONO, fontSize: 10, color: ACC, letterSpacing: 1.5 }}>
                  ● {pub.kind.toUpperCase()}

                <span style={{ fontFamily: MONO, fontSize: 10, color: MUT2, letterSpacing: 1.5 }}>
                  [{pub.lang}]

              <div style={{ fontSize: 13.5, color: FG, fontWeight: 600, lineHeight: 1.4 }}>
                {pub.title}
              </div>
              <div style={{ fontFamily: MONO, fontSize: 11, color: MUT, marginTop: "auto" }}>
                @ {pub.venue}
              </div>

      </div>
    </div>

}

// ── education + contact ───────────────────────────────────────────────────────
function EduContact({ compact }) {

    <div id="contact" className="edu-grid" style={{

    }}>
      <div>
        <SectionHeader cmd="$ cat ./education.txt" />
        <div style={{ display: "grid", gap: 8 }}>
          {P.education.map((e) => (
            <div key={e.title} style={{
              background: PNL, border: `1px solid ${BRD}`, padding: "12px 14px",
            }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: FG }}>{e.title}</div>
              <div style={{ fontSize: 12, color: MUT, marginTop: 2 }}>{e.org}</div>
              <div style={{
                fontFamily: MONO, fontSize: 10, marginTop: 4,

              }}>

                  <a className="cred-link" href={e.credential.url}

                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div>
        <SectionHeader cmd="$ ./contact --connect" />
        <div style={{ background: PNL, border: `1px solid ${BRD}`, padding: 18 }}>
          <div style={{ fontFamily: MONO, fontSize: 11, color: MUT2, letterSpacing: 1.5, marginBottom: 12 }}>
            // ESTABLISH_LINK
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {P.links.map((l) => (
              <a key={l.label} href={l.url} className="contact-row"
                 target={l.url.startsWith("http") ? "_blank" : undefined}
                 rel={l.url.startsWith("http") ? "noopener noreferrer" : undefined}
                 style={{
                   display: "flex", justifyContent: "space-between",
                   fontFamily: MONO, fontSize: 13, color: FG, textDecoration: "none",
                   border: `1px solid ${BRD2}`, padding: "10px 14px", background: BG,
                   transition: "border-color .15s, background .15s, transform .15s",
                 }}>
                <span><span style={{ color: ACC }}>▸</span> {l.label}</span>
                <span style={{ color: MUT, display: "flex", gap: 8, alignItems: "center" }}>
                  {l.url.replace(/^https?:\/\//, "").replace(/^mailto:/, "")}
                  <span className="contact-arrow" style={{ color: ACC, opacity: 0.4, transition: "opacity .2s, transform .2s" }}>↗</span>
                </span>
              </a>
            ))}
            <a key="telegram" href="https://t.me/aloecastles" className="contact-row" target="_blank" rel="noopener noreferrer"
               style={{
                 display: "flex", justifyContent: "space-between",
                 fontFamily: MONO, fontSize: 13, color: FG, textDecoration: "none",
                 border: `1px solid ${BRD2}`, padding: "10px 14px", background: BG,
                 transition: "border-color .15s, background .15s, transform .15s",
               }}>
              <span><span style={{ color: ACC2 }}>▸</span> Telegram</span>
              <span style={{ color: MUT, display: "flex", gap: 8, alignItems: "center" }}>
                t.me/aloecastles
                <span className="contact-arrow" style={{ color: ACC2, opacity: 0.4, transition: "opacity .2s, transform .2s" }}>↗</span>
              </span>
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── version footer ────────────────────────────────────────────────────────────
function VersionFooter() {
  const [version, setVersion] = React.useState("");

  React.useEffect(() => {
    fetch("./version.json")
      .then(r => r.json())
      .then(data => {
        const date = new Date(data.deployed);
        const formatted = date.toLocaleString("en-US", {
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit", second: "2-digit",
          hour12: false
        });
        setVersion(formatted);
      })
      .catch(() => setVersion(""));
  }, []);

  return version ? (
    <div style={{
      fontFamily: MONO, fontSize: 10, color: MUT2, marginTop: 12,
      paddingTop: 8, borderTop: `1px dashed ${BRD}`,
      textAlign: "right",
    }}>
      ▌ DEPLOYED {version}
    </div>
  ) : null;
}

// ── blinking terminal cursor ──────────────────────────────────────────────────
function PromptEnd() {
  return (
    <div style={{
      fontFamily: MONO, fontSize: 13, color: MUT2,
      paddingTop: 12, borderTop: `1px dashed ${BRD}`,
    }}>
      <span style={{ color: ACC2 }}>oleksii@gamedev</span>
      <span>:</span>
      <span style={{ color: ACC }}>~/portfolio</span>
      <span>$ </span>
      <span style={{
        display: "inline-block", width: 9, height: 14, background: ACC2,
        verticalAlign: "-2px", animation: "blink 1s steps(2) infinite",
      }} />
    </div>
  );
}

// ── root ──────────────────────────────────────────────────────────────────────
function App() {
  const detectMode = () =>
    typeof window !== "undefined" && window.matchMedia("(max-width: 720px)").matches ? "mobile" : "pc";
  const [mode, setMode]   = React.useState(detectMode);
  const [theme, setTheme] = React.useState("dark");
  const compact = mode === "mobile";
  const pad = compact ? 20 : 48;
  const gap = compact ? 28 : 48;

  React.useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  return (
    <>
      <div style={{
        fontFamily: SANS, background: BG, color: FG,
        minHeight: "100%", width: "100%", padding: pad, boxSizing: "border-box",
      }}>
        <NavBar mode={mode} setMode={setMode} theme={theme} setTheme={setTheme} />
        <Hero compact={compact} />
        <div style={{ height: gap }} />
        <Legend />
        <TrophyList compact={compact} />
        <div style={{ height: gap }} />
        <NDABlock compact={compact} />
        <div style={{ height: gap }} />
        <ExperienceTimeline compact={compact} />
        <div style={{ height: gap }} />
        <KeyAchievements compact={compact} />
        <div style={{ height: gap }} />
        <PlatformsReport />
        <div style={{ height: gap }} />
        <SkillsDump compact={compact} />
        <div style={{ height: gap }} />
        <Publications compact={compact} />
        <div style={{ height: gap }} />
        <EduContact compact={compact} />
        <div style={{ height: gap }} />
        <PromptEnd />
        <VersionFooter />
      </div>
      <CVDownloadFab />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
